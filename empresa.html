<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento Digital</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e1e1e;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #00aaff;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #222;
      padding: 10px;
    }

    nav a {
      color: #f4f4f4;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .cards {
      display: flex;
      justify-content: space-around;
      margin: 20px;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 8px;
      width: 30%;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    .controls {
      text-align: center;
      margin: 30px;
    }

    .controls button {
      background: #00aaff;
      border: none;
      padding: 15px 30px;
      margin: 10px;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    .controls button.exit {
      background: #ff4444;
    }

    table {
      width: 80%;
      margin: 20px auto;
      border-collapse: collapse;
      background: #1e1e1e;
      border-radius: 8px;
      overflow: hidden;
    }

    table th, table td {
      padding: 12px;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    table th {
      background: #00aaff;
      color: #fff;
    }

    .add-form {
      text-align: center;
      margin: 20px;
    }

    .add-form input {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    .add-form button {
      background: #00aaff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>GERENCIAMENTO DIGITAL</header>
  <nav>
    <a href="#">Dashboard</a>
    <a href="#">Equipe</a>
    <a href="#">Relatórios</a>
    <a href="#">Configurações</a>
  </nav>

  <div class="cards">
    <div class="card">Funcionários Ativos: <span id="ativos">0</span></div>
    <div class="card">Faltas Hoje: <span id="faltas">0</span></div>
    <div class="card">Horas Extras: <span id="extras">0h</span></div>
  </div>

  <div class="controls">
    <button onclick="registrarEntrada()">Entrada</button>
    <button class="exit" onclick="registrarSaida()">Saída</button>
  </div>

  <div class="add-form">
    <input type="text" id="nomeFuncionario" placeholder="Nome do funcionário">
    <button onclick="adicionarFuncionario()">Adicionar Funcionário</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Entrada</th>
        <th>Saída</th>
        <th>Horas Extras</th>
      </tr>
    </thead>
    <tbody id="listaFuncionarios">
      <!-- Funcionários serão adicionados aqui -->
    </tbody>
  </table>

  <script>
    let funcionarios = [];

    function adicionarFuncionario() {
      const nome = document.getElementById('nomeFuncionario').value;
      if(nome) {
        funcionarios.push({nome, entrada: '--:--', saida: '--:--', extras: '0h'});
        atualizarTabela();
        document.getElementById('nomeFuncionario').value = '';
        document.getElementById('ativos').innerText = funcionarios.length;
      }
    }

    function atualizarTabela() {
      const tbody = document.getElementById('listaFuncionarios');
      tbody.innerHTML = '';
      funcionarios.forEach(f => {
        const row = `<tr>
          <td>${f.nome}</td>
          <td>${f.entrada}</td>
          <td>${f.saida}</td>
          <td>${f.extras}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    function registrarEntrada() {
      const agora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      if(funcionarios.length > 0) {
        funcionarios[funcionarios.length-1].entrada = agora;
        atualizarTabela();
      }
    }

    function registrarSaida() {
      const agora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      if(funcionarios.length > 0) {
        funcionarios[funcionarios.length-1].saida = agora;
        funcionarios[funcionarios.length-1].extras = "1h"; // Simulação
        atualizarTabela();
      }
    }
  </script>
</body>
</html>
